; =====================================================
; Tachymètre Tracteur Tondeuse
; Cible : LilyGo TTGO T-Display (ESP32 + ST7789 1.14")
; =====================================================

[env:lilygo-t-display]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    bodmer/TFT_eSPI

; -------------------------------------------------------
; Configuration TFT_eSPI pour LilyGo TTGO T-Display
; Pilote  : ST7789V  |  Résolution : 135 x 240
; -------------------------------------------------------
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=6000000
